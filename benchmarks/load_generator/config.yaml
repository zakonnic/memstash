# Per-scenario overrides for the load generator. Every field is optional; an omitted field, block, or file keeps
# the built-in default from buildScenarios(). If you set goroutines, rps must have one entry per goroutine.
#
# Ships pre-filled with the built-in defaults, so it also documents them. Copied next to the binary by
# `make load-generator`, loaded from the working directory unless -config says otherwise.
#
# Values come from the workload package (scenario-1 = sessions, scenario-2 = CDN assets, scenario-3 = DB rows),
# deterministic per key, stored in a source-of-truth map and re-checked after every Get; errors go to errors.log.
#
# Keys follow a Zipf distribution (zipf_s > 1, higher = more skew); key_space is several times L1 capacity, so L1
# holds only the hot head and the tail leans on L2 or misses. redis_address: "" = L1 only, "host:port" = one node,
# comma-separated = cluster; omit to keep the default (scenario-1 none, scenarios 2/3 the docker cluster).

scenarios:
  # Web sessions, Zipf reads over a key space ~7.5x L1 capacity. L1 only.
  scenario-1:
    size: 20000
    redis_address: ""
    goroutines: 10
    read_percent: 90
    key_space: 1500000
    write_key_space: 1000000
    zipf_s: 1.1
    rps:
      - 1000
      - 1000
      - 1000
      - 1000
      - 1000
      - 1000
      - 1000
      - 1000
      - 1000
      - 1000

  # CDN / static assets, bimodal value sizes, key space ~7.5x L1. Redis L2 (cluster).
  scenario-2:
    size: 20000
    redis_address: "127.0.0.1:7001,127.0.0.1:7002,127.0.0.1:7003"
    goroutines: 5
    read_percent: 50
    key_space: 150000
    write_key_space: 150000
    zipf_s: 1.1
    rps:
      - 20000
      - 20000
      - 20000
      - 20000
      - 20000

  # DB rows, byte-weighted L1 (~10 MB holds ~28k of the ~200k keys). Redis L2 (cluster). One goroutine drives 10k
  # rps; the remaining 39 share 30k rps.
  scenario-3:
    size: 10000000
    redis_address: "127.0.0.1:6379"
    goroutines: 40
    read_percent: 90
    key_space: 20000000
    write_key_space: 20000000
    zipf_s: 1.1
    rps:
      - 10000
