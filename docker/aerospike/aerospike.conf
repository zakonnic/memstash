# single node with one in-memory namespace shaped like a small cache - bounded data size,
# the NSUP expiration sweep enabled (disabled by default).

service {
	proto-fd-max 15000
	cluster-name memstash
}

logging {
	console {
		context any info
	}
}

network {
	service {
		address any
		port 3000
	}

	heartbeat {
		mode mesh
		port 3002
		interval 150
		timeout 10
	}

	fabric {
		port 3001
	}
}

namespace memstash {
	replication-factor 1
	default-ttl 0
	nsup-period 30

	storage-engine memory {
		data-size 1024M # 10kk small records, 3kk average
	}
}
